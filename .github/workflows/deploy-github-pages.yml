# Pushes production build to branch `gh-pages`. GitHub Pages then serves that branch only (no repo source files).
#
# Setup (once): Repo → Settings → Pages → Build and deployment → Source: "Deploy from a branch"
#   Branch: gh-pages  ·  Folder: / (root)  ·  Save
#
# Site: https://cyclopsebunny.github.io/scheduler/
# If the repo is renamed, update npm script build:gh-pages (--base=/NEWNAME/).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build:gh-pages

      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
