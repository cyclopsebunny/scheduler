# Deploy static build to GitHub Pages.
# REQUIRED: Repo Settings → Pages → Build and deployment → Source: "GitHub Actions" (NOT "Deploy from a branch").
# Branch deploy publishes raw repo index.html (/src/main.tsx → 404). This workflow publishes Vite dist/.
# Site: https://cyclopsebunny.github.io/scheduler/ — keep npm run build:gh-pages base in sync with repo name.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build:gh-pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
